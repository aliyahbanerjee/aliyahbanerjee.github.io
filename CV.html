<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CV — Aliyah Banerjee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --blush: #e8a5a0;
        --blush-light: #f5d4d1;
        --blush-pale: #fdf0ef;
        --blush-deep: #c97c77;
        --ink: #2a2020;
        --ink-muted: #6b5555;
        --cream: #faf7f5;
        --rule: #e2ccc9;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'EB Garamond', Georgia, serif;
        background-color: var(--cream);
        color: var(--ink);
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }

      .top-rule {
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--blush), var(--blush-deep), var(--blush), transparent);
        position: relative;
        z-index: 1;
        flex-shrink: 0;
      }

      .page-header {
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
        padding: 56px 48px 28px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.9s ease both;
        flex-shrink: 0;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--rule);
        gap: 24px;
      }

      .site-name {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 2.8em;
        font-weight: 300;
        letter-spacing: 0.02em;
        color: var(--ink);
        line-height: 1;
        text-decoration: none;
      }

      nav {
        display: flex;
        gap: 32px;
        align-items: center;
        flex-shrink: 0;
      }

      nav a {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1em;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--ink-muted);
        position: relative;
        transition: color 0.25s;
      }

      nav a::after {
        content: '';
        position: absolute;
        bottom: -3px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--blush-deep);
        transition: width 0.3s ease;
      }

      nav a:hover { color: var(--blush-deep); }
      nav a:hover::after { width: 100%; }

      .page-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.1em;
        font-weight: 400;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--blush-deep);
        text-align: center;
        margin-top: 32px;
      }

      /* PDF viewer wrapper */
      .pdf-wrapper {
        flex: 1;
        max-width: 960px;
        width: 100%;
        margin: 24px auto 0;
        padding: 0 48px;
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
      }

      iframe {
        width: 100%;
        flex: 1;
        min-height: 75vh;
        border: none;
        border-radius: 8px;
        box-shadow: 0 4px 24px rgba(180, 100, 90, 0.1);
      }

      footer {
        max-width: 960px;
        width: 100%;
        margin: 32px auto 0;
        padding: 24px 48px 48px;
        border-top: 1px solid var(--rule);
        display: flex;
        justify-content: center;
        gap: 36px;
        position: relative;
        z-index: 1;
        flex-shrink: 0;
      }

      footer a {
        font-family: 'Cormorant Garamond', serif;
        font-size: 0.82em;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-muted);
        text-decoration: none;
        transition: color 0.2s;
      }

      footer a:hover { color: var(--blush-deep); }

      @media (max-width: 680px) {
        .page-header { padding: 36px 24px 24px; }
        header { flex-direction: column; gap: 16px; }
        .site-name { font-size: 2.1em; }
        .pdf-wrapper { padding: 0 24px; }
        footer { padding: 24px 24px 40px; }
      }
    </style>
  </head>
  <body>
    <div class="top-rule"></div>

    <div class="page-header">
      <header>
        <a class="site-name" href="index.html">Aliyah Banerjee</a>
        <nav>
          <a href="index.html">Home</a>
          <a href="Research.html">Research</a>
          <a href="CV.html">CV</a>
        </nav>
      </header>
      <div class="page-title">Curriculum Vitae</div>
    </div>

    <div class="pdf-wrapper">
      <iframe src="CV- Aliyah Banerjee (New).pdf"></iframe>
    </div>

    <footer>
      <a href="index.html">Home</a>
      <a href="Research.html">Research</a>
      <a href="CV.html">CV</a>
    </footer>
  </body>
</html>
